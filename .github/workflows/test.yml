name: Quality

on:
  push:
    branches: [main, develop, "codex/**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  RUST_BACKTRACE: 1

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.31.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run formatting checks
        run: pnpm lint

      - name: Run TypeScript type check
        run: pnpm typecheck

      - name: Run frontend tests
        run: pnpm test

      - name: Generate frontend coverage
        run: pnpm test:coverage

      - name: Build frontend bundle
        run: pnpm build

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage
          if-no-files-found: ignore
          retention-days: 7

  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run formatting checks
        working-directory: ./src-tauri
        run: cargo fmt --all -- --check

      - name: Run Clippy
        working-directory: ./src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Compile backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --tests --no-run

      - name: Run backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --verbose

      - name: Run backend integration tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --tests --verbose
